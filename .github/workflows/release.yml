name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- Windows Build ---
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # appflowy_editor 6.2.0 は Flutter 3.44+ でコンパイル不可のため 3.38.5 に固定
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Static Analysis
        run: flutter analyze

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows Release
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath open_manidoc_windows.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: open_manidoc_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- macOS Build ---
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # appflowy_editor 6.2.0 は Flutter 3.44+ でコンパイル不可のため 3.38.5 に固定
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Static Analysis
        run: flutter analyze

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS DMG
        run: |
          hdiutil create -volname "openManidoc" -srcfolder build/macos/Build/Products/Release/open_manidoc.app -ov -format UDZO open_manidoc_macos.dmg

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: open_manidoc_macos.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # --- Linux Build ---
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # appflowy_editor 6.2.0 は Flutter 3.44+ でコンパイル不可のため 3.38.5 に固定
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run Static Analysis
        run: flutter analyze

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux Release
        run: |
          tar -czf open_manidoc_linux.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: open_manidoc_linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
